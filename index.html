<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>CineScope</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>
  <h1>CineScope 🎬</h1>

  <input type="text" id="zoekInput" placeholder="Zoek film...">

  <select id="sortSelect">
    <option value="">Sorteer...</option>
    <option value="az">A naar Z</option>
    <option value="za">Z naar A</option>
  </select>
  <select id="genreSelect">
  <option value="">Alle genres</option>
  <option value="Drama">Drama</option>
  <option value="Comedy">Comedy</option>
  <option value="Action">Action</option>
  <option value="Crime">Crime</option>
  <option value="Romance">Romance</option>
</select>
<select id="themeSelect">
  <option value="auto">Systeem (default)</option>
  <option value="light">Light mode</option>
  <option value="dark">Dark mode</option>
</select>
  <div class="container">

  <div id="app">
    <div class="films"></div>
  </div>

  <div class="sidebar">
    <h2>Favorieten</h2>
    <div id="favorieten"></div>
  </div>

</div>

  <script type="module" src="/src/main.js"></script>
  <div id="modal" class="modal hidden">
  <div class="modal-content">
    <span id="closeModal">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>
</body>
</html>
